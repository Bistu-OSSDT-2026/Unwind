<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>团队主页 - 开源协作</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dark.css" id="theme-style">
    <link rel="stylesheet" href="mobile.css">
</head>
<body>

    <nav style="display: flex; justify-content: center; gap: 2rem; padding: 0.8rem 1.2rem; margin-bottom: 1rem; background: #f8fafc; border-radius: 12px; max-width: 1200px; margin-left: auto; margin-right: auto;">
        <a href="./" style="color: #2563eb; text-decoration: none; font-weight: 500;">🏠 主页</a>
        <a href="bistu.html" style="color: #2563eb; text-decoration: none; font-weight: 500;">🏛️ 学校介绍</a>
        <a href="https://unwind.freeflarum.com/" target="_blank">🎊校园论坛</a>
    </nav>

    <div style="text-align: center; margin-bottom: 10px;">
        <button id="themeToggle" style="padding: 8px 20px; border-radius: 20px; border: 1px solid #d0d7de; background: white; cursor: pointer; font-size: 0.9rem;">
            🌙 切换暗色模式
        </button>
    </div>

    <div class="container" id="mainContainer">
        <div class="content-card">
            <header>
                <h1>🏛️ 欢迎访问我们的学校论坛</h1>
                <p>北京信息科技大学 · 当前网页基于 GitHub-Pages 部署</p>
            </header>

            <div id="visualizer-container">
                <div id="clock">00:00:00</div>
                <div id="bars"></div>
            </div>

            <footer>
                <p>✨ 请允许我们使用您的麦克风权限 可以实现音频跳动</p>
            </footer>
            <footer>
                <p>✨ 由杨子锐 何沐言 孙溪苒 刘昊东协作编写 · v2.5.0</p>
            </footer>
        </div>
    </div>

    <script>
        // 暗色模式
        const toggleBtn = document.getElementById('themeToggle');
        toggleBtn.addEventListener('click', function() {
            document.body.classList.toggle('dark-mode');
            toggleBtn.textContent = document.body.classList.contains('dark-mode') ? '☀️ 切换亮色模式' : '🌙 切换暗色模式';
        });

        // 时钟
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('zh-CN', { hour12: false });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 音频可视化
        const barsContainer = document.getElementById('bars');
        const BAR_COUNT = 32;
        for (let i = 0; i < BAR_COUNT; i++) {
            const bar = document.createElement('div');
            bar.className = 'bar';
            barsContainer.appendChild(bar);
        }

        let audioContext, analyser, dataArray, bars = document.querySelectorAll('.bar');
        let isVisualizing = false;

        function startAudio() {
            if (isVisualizing) return;
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 64;
            dataArray = new Uint8Array(analyser.frequencyBinCount);

            navigator.mediaDevices.getUserMedia({ audio: true })
                .then(function(stream) {
                    const source = audioContext.createMediaStreamSource(stream);
                    source.connect(analyser);
                    isVisualizing = true;
                    visualize();
                })
                .catch(function(err) {
                    alert('请允许使用麦克风以体验音频跳动效果！');
                });
        }

        function visualize() {
            if (!isVisualizing) return;
            analyser.getByteFrequencyData(dataArray);
            for (let i = 0; i < bars.length; i++) {
                const value = dataArray[i] || 0;
                bars[i].style.height = Math.max(5, value / 255 * 60) + 'px';
            }
            requestAnimationFrame(visualize);
        }

        document.body.addEventListener('click', function startOnClick() {
            document.body.removeEventListener('click', startOnClick);
            startAudio();
        });
    </script>

</body>
</html>
