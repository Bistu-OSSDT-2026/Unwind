<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>团队主页 - 开源协作</title>
    <!-- 引入所有样式文件 -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dark.css" id="theme-style">
    <link rel="stylesheet" href="mobile.css">
</head>
<body>

    <!-- ===== 导航栏 ===== -->
    <div style="display: flex; justify-content: center; gap: 2rem; padding: 0.8rem 1.2rem; margin-bottom: 1rem; background: #f8fafc; border-radius: 12px; max-width: 1200px; margin-left: auto; margin-right: auto;">
        <a href="./" style="color: #2563eb; text-decoration: none; font-weight: 500;">🏠 主页</a>
        <a href="bistu.html" style="color: #2563eb; text-decoration: none; font-weight: 500;">🏛️ 学校介绍</a>
    </div>

    <!-- ===== 暗色模式切换按钮（在 container 上方） ===== -->
    <div style="text-align: center; margin-bottom: 10px;">
        <button id="themeToggle" style="padding: 8px 20px; border-radius: 20px; border: 1px solid #d0d7de; background: white; cursor: pointer; font-size: 0.9rem;">
            🌙 切换暗色模式
        </button>
    </div>

    <!-- ===== 主内容容器 ===== -->
    <!-- 🔥 唯一改动：把 bistu-campus.jpg 换成你实际上传的学校图片文件名 -->
    <div class="container" style="
        background-image: url('bistu-campus.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        border-radius: 16px;
        padding: 3rem 2rem;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        color: white;
        text-shadow: 0 2px 8px rgba(0,0,0,0.8);
        min-height: 400px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
    ">
        <header>
            <h1>🏛️ 欢迎访问我们的学校</h1>
            <p>北京信息科技大学 · 当前网页基于 GitHub-Pages 部署</p>
        </header>

        <footer>
            <p>✨ 通过 Pull Request 协作贡献 · v1.0.0</p>
        </footer>
    </div>

    <!-- ===== JavaScript：暗色模式切换 ===== -->
    <script>
        const toggleBtn = document.getElementById('themeToggle');
        toggleBtn.addEventListener('click', function() {
            document.body.classList.toggle('dark-mode');
            if (document.body.classList.contains('dark-mode')) {
                toggleBtn.textContent = '☀️ 切换亮色模式';
            } else {
                toggleBtn.textContent = '🌙 切换暗色模式';
            }
        });
    </script>

</body>
</html>
